<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1600">

<style>

@keyframes drift {
0% { transform: translate(0px,0px); }
50% { transform: translate(-60px,-40px); }
100% { transform: translate(0px,0px); }
}

.layer{
animation: drift 90s ease-in-out infinite;
}

</style>

<!-- BACKGROUND ROUGH -->
<rect width="1600" height="1600" fill="#0b3d2e"/>

<!-- FAIRWAY HOLE 1 -->
<g class="layer">

<path d="
M 100 600
C 300 500, 500 500, 700 600
C 900 700, 1050 700, 1200 650
C 1350 600, 1450 500, 1500 420
"

stroke="#62d877"
stroke-width="220"
stroke-linecap="round"
fill="none"
opacity=".55"
/>

</g>

<!-- GREEN 1 -->
<ellipse cx="1480" cy="400" rx="70" ry="55" fill="#9af5a8"/>

<ellipse cx="1480" cy="400" rx="100" ry="80"
fill="none"
stroke="#7edb8b"
stroke-width="10"
opacity=".5"/>

<!-- BUNKERS -->
<ellipse cx="1400" cy="380" rx="40" ry="18" fill="#e9e2b6"/>
<ellipse cx="1510" cy="470" rx="35" ry="16" fill="#e9e2b6"/>

<!-- WATER -->
<ellipse cx="420" cy="740" rx="150" ry="90" fill="#3aa3d8"/>

<!-- FAIRWAY HOLE 2 -->
<g class="layer">

<path d="
M 200 1200
C 400 1100, 700 1050, 900 1100
C 1100 1150, 1200 1200, 1350 1250
"

stroke="#62d877"
stroke-width="200"
stroke-linecap="round"
fill="none"
opacity=".55"
/>

</g>

<!-- GREEN 2 -->
<ellipse cx="1350" cy="1250" rx="65" ry="50" fill="#9af5a8"/>

<ellipse cx="1350" cy="1250" rx="90" ry="70"
fill="none"
stroke="#7edb8b"
stroke-width="10"
opacity=".5"/>

<!-- BUNKERS -->
<ellipse cx="1300" cy="1200" rx="35" ry="15" fill="#e9e2b6"/>
<ellipse cx="1410" cy="1300" rx="40" ry="18" fill="#e9e2b6"/>

<!-- WATER -->
<ellipse cx="650" cy="1320" rx="170" ry="100" fill="#3aa3d8"/>

<!-- LIGHTING GLOW -->
<defs>

<radialGradient id="lightGlow">
<stop offset="0%" stop-color="#ffffff" stop-opacity=".15"/>
<stop offset="70%" stop-opacity="0"/>
</radialGradient>

</defs>

<circle cx="300" cy="200" r="600" fill="url(#lightGlow)"/>

</svg>